# pytest.ini
# Configuration for pytest test discovery and behavior

[pytest]
# Directory where tests are located
testpaths = tests

# File naming convention for tests
python_files = test_*.py

# Ignore warnings to keep test output clean
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Add options for cleaner output
addopts = -v --tb=short --disable-warnings
